name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref (e.g. a PR branch pushed twice).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # ruff lints the source without importing it, so no heavy deps needed.
      - run: pip install ruff
      - run: ruff check .

  backend-test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # The unit tests only touch chromadb-free code (RetrievalResult now
      # lives in core.retrieval_types), so pytest is the only dependency —
      # no need to install chromadb just to run them. Run from the repo root
      # so the core/ and eval/ packages resolve without an editable install.
      - run: pip install pytest
      - run: python -m pytest -q

  frontend:
    name: Frontend (tsc + eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
