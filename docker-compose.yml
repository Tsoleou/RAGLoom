# 展場 kiosk 一鍵部署：ollama（本地 LLM）+ model-init（首次 pull 模型）+
# api（FastAPI 服務前端與 API）。
#   訪客面 → http://<booth>:8000/        （純對話 kiosk）
#   操作者面 → http://<booth>:8000/admin  （editor / dashboard / 管理）

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama       # 模型持久化，重啟不必重 pull
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    # ── GPU 加速（有 NVIDIA GPU 時取消註解；CPU-only 下 4B 推論會偏慢）──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # 一次性服務：等 ollama 起來後 pull 預設模型，跑完即退出。
  # 客戶之後要加模型：docker compose exec ollama ollama pull <model>
  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull gemma3:4b && ollama pull nomic-embed-text"]
    restart: "no"

  api:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully   # 模型備妥才啟動 → 首次自動 ingest 不會失敗
    environment:
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - RAG_SERVE_MODE=1
    volumes:
      - ./chroma_db:/app/chroma_db          # 向量庫持久化（空 → 首次自動建）
      - ./knowledge_base:/app/knowledge_base # 客戶丟文件進來、到 /admin 按 Load KB 重索引
      - ./config/profiles:/app/config/profiles # profile / pipeline 持久化
    ports:
      - "8000:8000"

volumes:
  ollama_models:
